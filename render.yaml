services:
  # Backend Service
  - type: web
    name: tma-backend
    runtime: node
    rootDir: tma-backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: BOT_TOKEN
        # This will prompt you to enter the token in Render dashboard
        sync: false
      - key: ADMIN_IDS
        # Comma-separated list of Telegram IDs
        sync: false
      - key: WEBAPP_URL
        fromService:
          type: web
          name: tma-frontend
          property: url

  # Frontend Service
  - type: web
    name: tma-frontend
    runtime: static
    rootDir: tma-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: tma-backend
          property: url
